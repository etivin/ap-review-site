<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP World History Study Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4de;
    --text: #1a1814;
    --muted: #8a8580;
    --accent: #c17f3a;
    --accent-light: #f5ede0;
    --green: #3a7a5a;
    --green-light: #e8f3ed;
    --red: #b84444;
    --red-light: #f5e8e8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  nav { display: flex; gap: 6px; }

  nav button {
    background: none;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  nav button:hover { color: var(--text); background: var(--bg); }
  nav button.active { color: var(--text); background: var(--accent-light); font-weight: 500; }

  .container { max-width: 820px; margin: 0 auto; padding: 48px 24px; }

  /* HOME */
  .home-hero { text-align: center; margin-bottom: 56px; }
  .home-hero h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 2.4rem;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .home-hero p { color: var(--muted); font-size: 1rem; font-weight: 300; }

  .period-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

  .period-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .period-card:hover { border-color: var(--accent); box-shadow: 0 4px 24px rgba(0,0,0,0.06); transform: translateY(-2px); }

  .period-number {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .period-card h3 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .period-card p { font-size: 0.8rem; color: var(--muted); font-weight: 300; }

  .period-card .card-footer {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* FLASHCARDS */
  .flashcard-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); border-color: var(--text); }

  .progress-bar-wrap { flex: 1; max-width: 280px; }
  .progress-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  .card-scene { perspective: 1000px; margin-bottom: 24px; }

  .card-3d {
    width: 100%;
    min-height: 280px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-3d.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    backface-visibility: hidden;
    text-align: center;
  }
  .card-face.back { transform: rotateY(180deg); background: var(--accent-light); border-color: #e0c99a; }

  .card-hint { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  .card-term {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .card-category { font-size: 0.75rem; color: var(--accent); font-weight: 500; }
  .card-def { font-size: 0.975rem; color: var(--text); line-height: 1.7; font-weight: 300; }

  .card-actions { display: flex; gap: 12px; justify-content: center; }

  .btn-wrong, .btn-right {
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-wrong { background: var(--red-light); color: var(--red); }
  .btn-wrong:hover { background: var(--red); color: white; }
  .btn-right { background: var(--green-light); color: var(--green); }
  .btn-right:hover { background: var(--green); color: white; }

  .shuffle-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .shuffle-btn:hover { color: var(--text); border-color: var(--text); }

  .done-card {
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 56px 40px;
  }
  .done-card h2 { font-family: 'Libre Baskerville', serif; font-size: 1.8rem; margin-bottom: 8px; }
  .done-card p { color: var(--muted); font-weight: 300; margin-bottom: 24px; }
  .score { font-size: 3rem; font-weight: 300; color: var(--accent); margin: 16px 0; }

  .restart-btn {
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.8; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 32px; }
  .timeline-dot {
    position: absolute;
    left: -28px;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .timeline-year { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .timeline-event { font-family: 'Libre Baskerville', serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .timeline-desc { font-size: 0.85rem; color: var(--muted); font-weight: 300; }

  .period-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* QUIZ */
  .quiz-q { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; line-height: 1.5; margin-bottom: 28px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .quiz-option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .quiz-option.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .quiz-option.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback { font-size: 0.875rem; line-height: 1.6; color: var(--muted); padding: 14px 18px; background: var(--bg); border-radius: 8px; margin-bottom: 16px; }
  .next-btn {
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .next-btn:hover { opacity: 0.8; }

  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: gap; gap: 12px; }

  .section-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 4px;
  }
  .section-sub { color: var(--muted); font-size: 0.875rem; font-weight: 300; margin-bottom: 32px; }

  /* hidden */
  .page { display: none; }
  .page.active { display: block; }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 32px 16px; }
    .home-hero h1 { font-size: 1.8rem; }
    nav button { padding: 8px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AP <span>World</span> History</div>
  <nav>
    <button class="active" onclick="showPage('home')">Home</button>
    <button onclick="showPage('flashcards')">Flashcards</button>
    <button onclick="showPage('timeline')">Timeline</button>
    <button onclick="showPage('quiz')">Quiz</button>
  </nav>
</header>

<div class="container">

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="home-hero">
      <h1>Study smarter,<br><em>not harder.</em></h1>
      <p>Flashcards, timelines, and quizzes for every AP World History period.</p>
    </div>
    <div class="period-grid" id="period-grid"></div>
  </div>

  <!-- FLASHCARDS -->
  <div class="page" id="page-flashcards">
    <div id="fc-period-select">
      <div class="section-title">Flashcards</div>
      <div class="section-sub">Choose a period to study</div>
      <div class="period-grid" id="fc-period-grid"></div>
    </div>
    <div id="fc-study" style="display:none">
      <div class="flashcard-controls">
        <button class="back-btn" onclick="exitFlashcards()">← Back</button>
        <div class="progress-bar-wrap">
          <div class="progress-label"><span id="fc-progress-label">Card 1 of 10</span><span id="fc-score-label">✓ 0</span></div>
          <div class="progress-bar"><div class="progress-fill" id="fc-progress-fill" style="width:0%"></div></div>
        </div>
        <button class="shuffle-btn" onclick="shuffleCards()">⇄ Shuffle</button>
      </div>
      <div id="fc-container"></div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="page" id="page-timeline">
    <div class="section-title">Key Events Timeline</div>
    <div class="section-sub">Major turning points in world history</div>
    <div class="period-filter" id="timeline-filters"></div>
    <div class="timeline" id="timeline-list"></div>
  </div>

  <!-- QUIZ -->
  <div class="page" id="page-quiz">
    <div id="quiz-period-select">
      <div class="section-title">Multiple Choice Quiz</div>
      <div class="section-sub">Test yourself on key concepts</div>
      <div class="period-grid" id="quiz-period-grid"></div>
    </div>
    <div id="quiz-play" style="display:none">
      <div class="quiz-header">
        <button class="back-btn" onclick="exitQuiz()">← Back</button>
        <div class="progress-bar-wrap">
          <div class="progress-label"><span id="quiz-progress-label">Q 1 of 5</span><span id="quiz-score-label">Score: 0</span></div>
          <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill" style="width:0%"></div></div>
        </div>
      </div>
      <div id="quiz-container"></div>
    </div>
  </div>

</div>

<script>
const DATA = {
  periods: [
    {
      id: 1,
      label: "Period 1",
      title: "The Global Tapestry",
      dates: "1200–1450",
      desc: "Empires, religions, trade networks across Afro-Eurasia",
      terms: [
        { term: "Song Dynasty", def: "Chinese dynasty (960–1279) known for economic revolution, commercialization, and technological innovations like movable type and gunpowder.", category: "State Building" },
        { term: "Mongol Empire", def: "Largest contiguous land empire in history, connected Eurasia via Pax Mongolica and facilitated trade along the Silk Roads.", category: "State Building" },
        { term: "Dar al-Islam", def: "The Islamic world — regions under Muslim rule or influence — which served as a major connector of trade and knowledge from Spain to Southeast Asia.", category: "Religion" },
        { term: "Silk Roads", def: "Overland and sea routes connecting East Asia to Europe and Africa, facilitating exchange of goods, ideas, and diseases.", category: "Trade" },
        { term: "Ibn Battuta", def: "14th-century Muslim traveler from Morocco who journeyed ~75,000 miles across Afro-Eurasia, documenting societies and trade networks.", category: "People" },
        { term: "Feudalism", def: "Hierarchical system in medieval Europe and Japan where lords granted land (fiefs) to vassals in exchange for military service.", category: "Social Structure" },
        { term: "Mali Empire", def: "West African empire that controlled trans-Saharan gold-salt trade; Mansa Musa's hajj (1324) displayed its immense wealth.", category: "State Building" },
        { term: "Champa Rice", def: "Fast-ripening, drought-resistant rice from Vietnam adopted by Song China, enabling population growth and agricultural surplus.", category: "Economics" },
      ],
      quizzes: [
        { q: "Which Chinese dynasty is most associated with the 'economic revolution' of the 10th–13th centuries?", options: ["Tang Dynasty", "Song Dynasty", "Ming Dynasty", "Han Dynasty"], answer: 1, explain: "The Song Dynasty experienced commercialization, a merchant class boom, and innovations like paper money and improved agriculture." },
        { q: "The Pax Mongolica primarily facilitated which of the following?", options: ["The spread of Buddhism to Europe", "Safe trade and travel across Eurasia", "The collapse of the Silk Roads", "European colonization of Asia"], answer: 1, explain: "The Mongol Peace created safe conditions for merchants, diplomats, and travelers to cross Eurasia, boosting long-distance trade." },
        { q: "Mansa Musa's pilgrimage to Mecca in 1324 is most significant because it:", options: ["Spread Islam to West Africa for the first time", "Demonstrated Mali's enormous gold wealth to the world", "Led to the collapse of the Mali Empire", "Established trade with China"], answer: 1, explain: "Mansa Musa spent so lavishly that he caused inflation in Egypt, revealing Mali's incredible wealth to the wider world." },
        { q: "The adoption of Champa rice in Song China primarily led to:", options: ["Increased military power", "Population growth and urbanization", "The decline of the Silk Roads", "Conflict with Southeast Asia"], answer: 1, explain: "Champa rice's fast-ripening nature allowed multiple harvests per year, producing surpluses that fueled population growth." },
        { q: "Which of the following best describes the role of the Dar al-Islam in this period?", options: ["A unified political empire spanning Africa and Asia", "A cultural and economic connector linking distant regions", "A religious movement opposed to trade", "An isolated civilization with no external contact"], answer: 1, explain: "The Dar al-Islam wasn't a single empire but a shared cultural/religious space that facilitated trade and knowledge exchange across Afro-Eurasia." },
      ]
    },
    {
      id: 2,
      label: "Period 2",
      title: "Networks of Exchange",
      dates: "1200–1450",
      desc: "Cross-cultural interactions, the Black Death, Mongol impact",
      terms: [
        { term: "Black Death", def: "Bubonic plague pandemic (1346–1353) that killed 30–60% of Europe's population; spread via trade routes, particularly from Central Asia.", category: "Disease" },
        { term: "Indian Ocean Trade", def: "Maritime network connecting East Africa, Arabia, India, and Southeast Asia using monsoon winds; dominated by Muslim merchants.", category: "Trade" },
        { term: "Hanseatic League", def: "Medieval commercial and defensive confederation of merchant guilds and market towns in Northern Europe.", category: "Trade" },
        { term: "Diasporic Merchants", def: "Merchants who settled in foreign cities (e.g., Chinese in Southeast Asia, Jews in Europe) to facilitate long-distance trade networks.", category: "Trade" },
        { term: "Swahili Coast", def: "East African coastal region that became prosperous through Indian Ocean trade, producing city-states like Kilwa and Mombasa.", category: "Trade" },
        { term: "Marco Polo", def: "Venetian merchant who traveled to China under the Mongol Yuan Dynasty, whose accounts introduced Europeans to Asian wealth.", category: "People" },
        { term: "Zheng He", def: "Chinese Muslim admiral who led seven massive tributary voyages (1405–1433) through Southeast Asia, India, and East Africa.", category: "People" },
        { term: "Trans-Saharan Trade", def: "Caravan routes across the Sahara linking sub-Saharan Africa to North Africa and the Mediterranean, trading gold, salt, and slaves.", category: "Trade" },
      ],
      quizzes: [
        { q: "The Black Death spread most rapidly because of:", options: ["Mongol biological warfare", "Trade networks connecting Eurasia", "River flooding in Europe", "Agricultural failures in China"], answer: 1, explain: "The plague traveled along established trade routes, especially the Silk Roads and maritime routes, spreading from Central Asia westward." },
        { q: "Zheng He's voyages differed from later European voyages because they:", options: ["Sought to establish colonies", "Were primarily focused on tribute and diplomacy, not conquest", "Opened new trade routes to the Americas", "Were funded by private merchants"], answer: 1, explain: "Zheng He's voyages were state-sponsored to project imperial power and collect tribute — not to colonize or establish permanent trade posts." },
        { q: "Which factor most enabled the Indian Ocean trade network?", options: ["Portuguese naval dominance", "Predictable monsoon wind patterns", "The spread of Christianity", "Chinese naval power"], answer: 1, explain: "Merchants had used seasonal monsoon winds for centuries to predictably sail across the Indian Ocean, making regular trade possible." },
        { q: "The Swahili city-states became prosperous primarily through:", options: ["Agricultural surpluses", "Participation in Indian Ocean trade", "Military conquest of East Africa", "Chinese colonization"], answer: 1, explain: "Cities like Kilwa grew wealthy as trading hubs connecting sub-Saharan Africa's gold and ivory to the Indian Ocean commercial network." },
        { q: "Diasporic merchant communities were significant because they:", options: ["Created political empires", "Facilitated trust and reduced transaction costs in long-distance trade", "Replaced local economies", "Spread Christianity globally"], answer: 1, explain: "Merchants from the same community living abroad created networks of trust, credit, and information that made long-distance commerce viable." },
      ]
    },
    {
      id: 3,
      label: "Period 3",
      title: "Land-Based Empires",
      dates: "1450–1750",
      desc: "Gunpowder empires, absolutism, new state structures",
      terms: [
        { term: "Gunpowder Empires", def: "Ottoman, Safavid, and Mughal empires that used gunpowder weapons to consolidate power across a vast swath of Asia and Eastern Europe.", category: "State Building" },
        { term: "Ottoman Empire", def: "Sunni Muslim empire (1299–1922) that controlled Anatolia, the Middle East, North Africa, and southeastern Europe; capital Constantinople.", category: "State Building" },
        { term: "Mughal Empire", def: "Islamic empire ruling most of South Asia (1526–1857), known for religious tolerance under Akbar and magnificent architecture like the Taj Mahal.", category: "State Building" },
        { term: "Devshirme", def: "Ottoman practice of recruiting Christian boys, converting them to Islam, and training them as elite soldiers (Janissaries) or administrators.", category: "Social Structure" },
        { term: "Akbar", def: "Greatest Mughal emperor (r. 1556–1605) who promoted religious tolerance, abolished the jizya tax on non-Muslims, and oversaw cultural flourishing.", category: "People" },

        { term: "Safavid Empire", def: "Shia Muslim empire of Persia (1501–1736) that created a powerful rival to the Sunni Ottomans; capital Isfahan.", category: "State Building" },
        { term: "Manchu (Qing) Dynasty", def: "Last Chinese imperial dynasty (1644–1912), founded by Manchus who maintained cultural distinctions while adopting Chinese governing practices.", category: "State Building" },
      ],
      quizzes: [
        { q: "What technological innovation most explains the rise of the Gunpowder Empires?", options: ["The printing press", "Gunpowder weapons like cannons and muskets", "Iron-hulled warships", "Advanced mathematics"], answer: 1, explain: "Access to gunpowder weaponry allowed the Ottomans, Safavids, and Mughals to overcome nomadic cavalry forces and fortified cities." },
        { q: "The Ottoman devshirme system was significant because it:", options: ["Eliminated religious diversity", "Created loyalty to the sultan over family or ethnic ties", "Enslaved Ottoman citizens", "Brought Christianity to the empire"], answer: 1, explain: "Boys taken through devshirme owed everything to the sultan, creating a loyal administrative/military class free of competing clan loyalties." },
        { q: "Emperor Akbar is best known for which policy?", options: ["Forced conversion of Hindus to Islam", "Religious tolerance and cultural synthesis", "Military expansion into Europe", "Creating the devshirme system"], answer: 1, explain: "Akbar abolished the jizya tax, welcomed religious debate, and promoted a syncretic culture combining Hindu and Islamic traditions." },
        { q: "The Safavid-Ottoman conflict was primarily driven by:", options: ["Competition for Indian Ocean trade", "Sunni-Shia religious rivalry", "Control of the Silk Road to China", "European interference"], answer: 1, explain: "The Safavids adopted Shia Islam as the state religion, making them ideological enemies of the Sunni Ottomans and leading to frequent warfare." },
        { q: "European absolutism most closely resembles which concept?", options: ["Democracy with a strong president", "Unlimited royal authority legitimized by divine right", "A constitutional monarchy", "Rule by aristocrats and nobles"], answer: 1, explain: "Absolute monarchs like Louis XIV claimed God-given authority to rule without constitutional limits, concentrating all power in the crown." },
      ]
    },
    {
      id: 4,
      label: "Period 4",
      title: "Transoceanic Interconnections",
      dates: "1450–1750",
      desc: "European exploration, Columbian Exchange, Atlantic slave trade",
      terms: [
        { term: "Columbian Exchange", def: "Transfer of plants, animals, diseases, and people between the Americas and Afro-Eurasia following Columbus's 1492 voyage.", category: "Exchange" },
        { term: "Atlantic Slave Trade", def: "Forced migration of ~12.5 million Africans to the Americas (1500s–1800s) to labor on plantations; part of the Triangular Trade.", category: "Demographics" },

    { year: "1917", event: "Russian Revolution", desc: "Bolsheviks seize power; first communist state established.", period: 6 },
    { year: "1945", event: "End of World War II / UN Founded", desc: "Deadliest conflict in history ends; United Nations established to prevent future wars.", period: 6 },
    { year: "1947", event: "Indian Independence / Cold War Begins", desc: "Britain grants India independence; US-Soviet rivalry intensifies globally.", period: 6 },
    { year: "1991", event: "Soviet Union Collapses", desc: "End of Cold War; US emerges as sole superpower; globalization accelerates.", period: 6 },
  ]
};

// STATE
let currentPage = 'home';
let fcCards = [], fcIndex = 0, fcCorrect = 0, fcFlipped = false;
let quizQuestions = [], quizIndex = 0, quizScore = 0, quizAnswered = false;
let timelineFilter = 0;

// NAVIGATION
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['home','flashcards','timeline','quiz'][i] === p);
  });
  currentPage = p;
  if (p === 'home') renderHome();
  if (p === 'timeline') renderTimeline();
}

// HOME
function renderHome() {
  const grid = document.getElementById('period-grid');
  grid.innerHTML = DATA.periods.map(p => `
    <div class="period-card" onclick="startFlashcards(${p.id})">
      <div class="period-number">${p.label} · ${p.dates}</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="card-footer">
        <span class="badge">${p.terms.length} flashcards</span>
        <span class="badge">${p.quizzes.length} quiz Qs</span>
      </div>
    </div>
  `).join('');
}

// FLASHCARDS
function renderFCPeriodGrid() {
  const grid = document.getElementById('fc-period-grid');
  grid.innerHTML = DATA.periods.map(p => `
    <div class="period-card" onclick="startFlashcards(${p.id})">
      <div class="period-number">${p.label} · ${p.dates}</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="card-footer"><span class="badge">${p.terms.length} cards</span></div>
    </div>
  `).join('');
}

function startFlashcards(periodId) {
  showPage('flashcards');
  const period = DATA.periods.find(p => p.id === periodId);
  fcCards = [...period.terms];
  fcIndex = 0; fcCorrect = 0; fcFlipped = false;
  document.getElementById('fc-period-select').style.display = 'none';
  document.getElementById('fc-study').style.display = 'block';
  renderCard();
}

function exitFlashcards() {
  document.getElementById('fc-period-select').style.display = 'block';
  document.getElementById('fc-study').style.display = 'none';
  renderFCPeriodGrid();
}

function shuffleCards() {
  fcCards = fcCards.sort(() => Math.random() - 0.5);
  fcIndex = 0; fcCorrect = 0;
  renderCard();
}

function renderCard() {
  const container = document.getElementById('fc-container');
  const total = fcCards.length;

  if (fcIndex >= total) {
    container.innerHTML = `
      <div class="done-card">
        <h2>Deck Complete! 🎉</h2>
        <div class="score">${fcCorrect}/${total}</div>
        <p>${fcCorrect === total ? 'Perfect score! You nailed it.' : fcCorrect >= total * 0.7 ? 'Great job! Keep reviewing the ones you missed.' : 'Keep studying — you\'ve got this!'}</p>
        <button class="restart-btn" onclick="fcIndex=0;fcCorrect=0;renderCard()">Restart Deck</button>
      </div>`;
    return;
  }

  const card = fcCards[fcIndex];
  const pct = (fcIndex / total * 100).toFixed(0);
  document.getElementById('fc-progress-label').textContent = `Card ${fcIndex + 1} of ${total}`;
  document.getElementById('fc-score-label').textContent = `✓ ${fcCorrect}`;
  document.getElementById('fc-progress-fill').style.width = pct + '%';

  container.innerHTML = `
    <div class="card-scene">
      <div class="card-3d" id="card3d" onclick="flipCard()">
        <div class="card-face front">
          <div class="card-hint">Tap to reveal definition</div>
          <div class="card-term">${card.term}</div>
          <div class="card-category">${card.category}</div>
        </div>
        <div class="card-face back">
          <div class="card-hint">Definition</div>
          <div class="card-def">${card.def}</div>
        </div>
      </div>
    </div>
    <div class="card-actions" id="card-actions" style="display:none">
      <button class="btn-wrong" onclick="markCard(false)">✗ Still learning</button>
      <button class="btn-right" onclick="markCard(true)">✓ Got it</button>
    </div>`;

  fcFlipped = false;
}

function flipCard() {
  const card = document.getElementById('card3d');
  fcFlipped = !fcFlipped;
  card.classList.toggle('flipped', fcFlipped);
  document.getElementById('card-actions').style.display = fcFlipped ? 'flex' : 'none';
}

function markCard(correct) {
  if (correct) fcCorrect++;
  fcIndex++;
  renderCard();
}

// TIMELINE
function renderTimeline() {
  const filters = document.getElementById('timeline-filters');
  filters.innerHTML = `<button class="filter-btn active" onclick="filterTimeline(0, this)">All Periods</button>` +
    DATA.periods.map(p => `<button class="filter-btn" onclick="filterTimeline(${p.id}, this)">${p.label}</button>`).join('');

  renderTimelineList();
}

function filterTimeline(id, btn) {
  timelineFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimelineList();
}

function renderTimelineList() {
  const list = document.getElementById('timeline-list');
  const items = timelineFilter === 0 ? DATA.timeline : DATA.timeline.filter(t => t.period === timelineFilter);
  list.innerHTML = items.map(t => `
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-year">${t.year}</div>
      <div class="timeline-event">${t.event}</div>
      <div class="timeline-desc">${t.desc}</div>
    </div>
  `).join('');
}

// QUIZ
function renderQuizPeriodGrid() {
  const grid = document.getElementById('quiz-period-grid');
  grid.innerHTML = DATA.periods.map(p => `
    <div class="period-card" onclick="startQuiz(${p.id})">
      <div class="period-number">${p.label} · ${p.dates}</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="card-footer"><span class="badge">${p.quizzes.length} questions</span></div>
    </div>
  `).join('');
}

function startQuiz(periodId) {
  const period = DATA.periods.find(p => p.id === periodId);
  quizQuestions = [...period.quizzes].sort(() => Math.random() - 0.5);
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  document.getElementById('quiz-period-select').style.display = 'none';
  document.getElementById('quiz-play').style.display = 'block';
  renderQuizQ();
}

function exitQuiz() {
  document.getElementById('quiz-period-select').style.display = 'block';
  document.getElementById('quiz-play').style.display = 'none';
  renderQuizPeriodGrid();
}

function renderQuizQ() {
  const container = document.getElementById('quiz-container');
  const total = quizQuestions.length;

  if (quizIndex >= total) {
    container.innerHTML = `
      <div class="done-card">
        <h2>Quiz Complete! 📝</h2>
        <div class="score">${quizScore}/${total}</div>
        <p>${quizScore === total ? 'Perfect! You crushed it.' : quizScore >= total * 0.6 ? 'Solid work! Review the ones you missed.' : 'Keep studying — practice makes perfect.'}</p>
        <button class="restart-btn" onclick="quizIndex=0;quizScore=0;renderQuizQ()">Retake Quiz</button>
      </div>`;
    return;
  }

  const q = quizQuestions[quizIndex];
  const pct = (quizIndex / total * 100).toFixed(0);
  document.getElementById('quiz-progress-label').textContent = `Q ${quizIndex + 1} of ${total}`;
  document.getElementById('quiz-score-label').textContent = `Score: ${quizScore}`;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';

  container.innerHTML = `
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `
        <button class="quiz-option" onclick="answerQuiz(${i})" id="opt-${i}">${opt}</button>
      `).join('')}
    </div>
    <div id="quiz-feedback" style="display:none" class="quiz-feedback"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuizQ()">
      ${quizIndex + 1 < total ? 'Next Question →' : 'See Results'}
    </button>`;
}

function answerQuiz(chosen) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIndex];
  const correct = q.answer;

  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  if (chosen === correct) quizScore++;

  const feedback = document.getElementById('quiz-feedback');
  feedback.style.display = 'block';
  feedback.innerHTML = `<strong>${chosen === correct ? '✓ Correct!' : '✗ Not quite.'}</strong> ${q.explain}`;

  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuizQ() {
  quizIndex++;
  quizAnswered = false;
  renderQuizQ();
}

// INIT
renderHome();
renderFCPeriodGrid();
renderQuizPeriodGrid();
</script>
</body>
</html>
